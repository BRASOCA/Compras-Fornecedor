<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendário de Compras Avançado</title>
    <!-- Importando Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Importando Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <style>
        .calendar-cell { min-height: 110px; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 10px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 10px; }
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }
        .modal-animate { animation: fadeIn 0.2s ease-out forwards; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <!-- Cabeçalho -->
    <header class="bg-indigo-600 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4 flex items-center gap-3">
            <i class="ph ph-calendar-check text-3xl"></i>
            <div>
                <h1 class="text-2xl font-bold">Gestão Avançada de Compras</h1>
                <p class="text-indigo-200 text-sm">Controle de Fornecedores, Itens e Logística</p>
            </div>
        </div>
    </header>

    <!-- Conteúdo Principal -->
    <main class="flex-grow max-w-7xl mx-auto w-full px-4 sm:px-6 lg:px-8 py-8 grid grid-cols-1 lg:grid-cols-12 gap-8">
        
        <!-- Painel Lateral: Formulário -->
        <section class="lg:col-span-4 space-y-6">
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h2 class="text-xl font-semibold mb-5 flex items-center gap-2 text-indigo-700 border-b border-slate-100 pb-3">
                    <i class="ph ph-shopping-cart-simple text-2xl"></i>
                    Nova Compra
                </h2>
                
                <form id="purchaseForm" class="space-y-5">
                    <div class="grid grid-cols-2 gap-4">
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Data</label>
                            <input type="date" id="dataCompra" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                        </div>
                        <div class="col-span-2 sm:col-span-1">
                            <label class="block text-sm font-medium text-slate-700 mb-1">Fornecedor</label>
                            <input type="text" id="fornecedor" list="listaFornecedores" placeholder="Ex: Fornecedor XYZ" required class="w-full px-3 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 outline-none">
                            <datalist id="listaFornecedores">
                                <option value="Atacadão das Embalagens">
                                <option value="Tech Solutions">
                                <option value="Distribuidora Central">
                            </datalist>
                        </div>
                    </div>

                    <!-- Seção de Produtos Dinâmica -->
                    <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                        <label class="block text-sm font-bold text-slate-700 mb-2">Itens Comprados</label>
                        <div id="produtosList" class="space-y-2">
                            <!-- Template do primeiro item (fixo) -->
                            <div class="produto-item flex flex-wrap sm:flex-nowrap gap-2 items-center">
                                <input type="text" class="prod-nome flex-1 min-w-[120px] px-3 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="Nome do Item (Ex: Frigideira)" required>
                                <input type="number" class="prod-qtd w-20 px-3 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="Qtd" min="1" required>
                                <div class="relative w-28">
                                    <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-slate-500 text-xs font-bold">R$</span>
                                    <input type="number" class="prod-valor w-full pl-7 pr-2 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="0.00" step="0.01" min="0" required oninput="calcularTotalForm()">
                                </div>
                            </div>
                        </div>
                        <button type="button" id="btnAddProduto" class="text-sm text-indigo-600 hover:text-indigo-800 font-bold mt-3 flex items-center gap-1 transition-colors">
                            <i class="ph ph-plus-circle text-lg"></i> Adicionar outro item
                        </button>
                    </div>

                    <!-- Seção de Logística -->
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-1">Custo de Logística</label>
                        <div class="relative">
                            <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none text-slate-500">
                                <i class="ph ph-truck text-lg"></i>
                            </div>
                            <select id="logistica" onchange="calcularTotalForm()" class="w-full pl-10 pr-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-indigo-500 appearance-none bg-white font-medium text-slate-700">
                                <option value="0" data-nome="Nenhuma">Nenhuma - R$ 0,00</option>
                                <option value="1.20" data-nome="Apenas Etiqueta">Apenas Etiqueta - R$ 1,20</option>
                                <option value="2.00" data-nome="Apenas Embalagem">Apenas Embalagem - R$ 2,00</option>
                                <option value="2.00" data-nome="Apenas Kit">Apenas Kit - R$ 2,00</option>
                                <option value="2.50" data-nome="Kit + Embalagem">Kit + Embalagem - R$ 2,50</option>
                            </select>
                        </div>
                    </div>

                    <!-- Total Visível -->
                    <div class="bg-indigo-50 p-4 rounded-lg flex justify-between items-center border border-indigo-100">
                        <span class="text-indigo-800 font-medium">Valor Total:</span>
                        <span id="displayTotalForm" class="text-2xl font-bold text-indigo-700">R$ 0,00</span>
                    </div>

                    <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition-colors flex items-center justify-center gap-2 shadow-sm">
                        <i class="ph ph-check-circle text-xl"></i>
                        Agendar e Salvar
                    </button>
                </form>
            </div>

            <!-- Resumo Financeiro do Mês -->
            <div class="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                <h3 class="text-lg font-bold mb-4 text-slate-800 flex items-center gap-2">
                    <i class="ph ph-chart-line-up text-indigo-600"></i> Resumo do Mês
                </h3>
                <div class="space-y-3">
                    <div class="flex justify-between items-center py-2 border-b border-slate-100">
                        <span class="text-slate-600 font-medium">Qtd. de Pedidos</span>
                        <span id="totalPedidosMes" class="font-bold text-slate-800 text-lg">0</span>
                    </div>
                    <div class="flex justify-between items-center pt-2">
                        <span class="text-slate-600 font-medium">Gasto Estimado</span>
                        <span id="totalValorMes" class="font-black text-emerald-600 text-xl">R$ 0,00</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- Painel Principal: Calendário -->
        <section class="lg:col-span-8 bg-white p-6 rounded-xl shadow-sm border border-slate-200 flex flex-col">
            
            <div class="flex items-center justify-between mb-6">
                <h2 id="mesAnoAtual" class="text-2xl font-black text-slate-800 capitalize">Abril 2026</h2>
                <div class="flex gap-2">
                    <button id="btnPrevMonth" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 border border-transparent hover:border-slate-200 transition-all"><i class="ph ph-caret-left text-xl"></i></button>
                    <button id="btnHoje" class="px-4 py-2 rounded-lg bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold transition-colors">Hoje</button>
                    <button id="btnNextMonth" class="p-2 rounded-lg hover:bg-slate-100 text-slate-600 border border-transparent hover:border-slate-200 transition-all"><i class="ph ph-caret-right text-xl"></i></button>
                </div>
            </div>

            <div class="flex-grow">
                <div class="grid grid-cols-7 gap-px bg-slate-200 border border-slate-200 rounded-t-xl overflow-hidden">
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Dom</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Seg</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Ter</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Qua</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Qui</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Sex</div>
                    <div class="bg-slate-50 py-3 text-center text-sm font-bold text-slate-500 uppercase tracking-wider">Sáb</div>
                </div>
                <div id="calendarGrid" class="grid grid-cols-7 gap-px bg-slate-200 border-x border-b border-slate-200 rounded-b-xl">
                    <!-- Gerado via JavaScript -->
                </div>
            </div>
        </section>
    </main>

    <!-- Modal de Detalhes do Dia -->
    <div id="dayModal" class="fixed inset-0 bg-slate-900/60 backdrop-blur-sm hidden items-center justify-center z-50 p-4">
        <div class="bg-white rounded-2xl shadow-2xl max-w-lg w-full modal-animate flex flex-col max-h-[90vh]">
            <div class="flex items-center justify-between p-5 border-b border-slate-100 bg-slate-50 rounded-t-2xl">
                <div>
                    <h3 id="modalTitle" class="text-xl font-black text-slate-800">Compras do dia</h3>
                    <p id="modalSubtitle" class="text-sm text-slate-500 mt-1"></p>
                </div>
                <button id="closeModal" class="p-2 rounded-lg hover:bg-slate-200 text-slate-500 transition-colors">
                    <i class="ph ph-x text-xl"></i>
                </button>
            </div>
            
            <div id="modalContent" class="p-5 overflow-y-auto custom-scrollbar space-y-4 flex-grow bg-slate-50/50">
                <!-- Conteúdo gerado via JS -->
            </div>
            
            <div class="p-5 border-t border-slate-200 bg-white rounded-b-2xl flex justify-between items-center shadow-[0_-10px_15px_-3px_rgba(0,0,0,0.05)]">
                <div>
                    <span class="text-slate-500 text-sm font-medium">Total Acumulado do Dia:</span>
                    <div id="modalTotalDia" class="text-2xl font-black text-indigo-600">R$ 0,00</div>
                </div>
                <button id="closeModalBtn" class="px-5 py-2.5 bg-slate-800 hover:bg-slate-700 text-white font-medium rounded-lg transition-colors">
                    Fechar
                </button>
            </div>
        </div>
    </div>

    <!-- Scripts da Aplicação -->
    <script>
        // --- Estado da Aplicação ---
        let currentDate = new Date(); 
        let compras = []; 

        // Recuperar dados salvos no localStorage ao iniciar
        const comprasSalvas = localStorage.getItem('compras_calendario_avancado');
        
        if (comprasSalvas) {
            compras = JSON.parse(comprasSalvas);
        } else {
            // Migração de dados antigos se existirem, ou dados de exemplo
            const comprasAntigas = localStorage.getItem('compras_calendario');
            if(comprasAntigas) {
                compras = JSON.parse(comprasAntigas);
            } else {
                const hojeIso = currentDate.toISOString().split('T')[0];
                compras.push({
                    id: Date.now().toString(),
                    data: hojeIso,
                    fornecedor: 'Distribuidora Exemplo',
                    produtos: [
                        { nome: 'Frigideiras Antiaderentes', quantidade: 30, valor: 1500.00 }
                    ],
                    logistica: { nome: 'Apenas Embalagem', valor: 2.00 },
                    valorTotal: 1502.00
                });
                salvarDados();
            }
        }

        // --- Elementos do DOM ---
        const mesAnoAtualEl = document.getElementById('mesAnoAtual');
        const calendarGridEl = document.getElementById('calendarGrid');
        const formCompra = document.getElementById('purchaseForm');
        const totalPedidosMesEl = document.getElementById('totalPedidosMes');
        const totalValorMesEl = document.getElementById('totalValorMes');
        
        const modal = document.getElementById('dayModal');
        const modalTitle = document.getElementById('modalTitle');
        const modalSubtitle = document.getElementById('modalSubtitle');
        const modalContent = document.getElementById('modalContent');
        const modalTotalDia = document.getElementById('modalTotalDia');
        const closeModalBtns = [document.getElementById('closeModal'), document.getElementById('closeModalBtn')];

        const meses = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
        const formatadorMoeda = new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' });

        // --- Inicialização ---
        function init() {
            document.getElementById('dataCompra').value = currentDate.toISOString().split('T')[0];
            renderCalendar();
            setupEventListeners();
            calcularTotalForm(); // Inicializa o display com 0
        }

        function salvarDados() {
            localStorage.setItem('compras_calendario_avancado', JSON.stringify(compras));
        }

        // --- Lógica do Formulário ---
        function calcularTotalForm() {
            let total = 0;
            
            // Soma valor dos produtos
            document.querySelectorAll('.prod-valor').forEach(input => {
                total += parseFloat(input.value) || 0;
            });
            
            // Adiciona valor da logística
            const logisticaSelect = document.getElementById('logistica');
            total += parseFloat(logisticaSelect.value) || 0;
            
            // Atualiza UI
            document.getElementById('displayTotalForm').textContent = formatadorMoeda.format(total);
            return total;
        }

        function handleAddPurchase(e) {
            e.preventDefault();

            // Coleta Produtos
            const itens = [];
            document.querySelectorAll('.produto-item').forEach(item => {
                const nome = item.querySelector('.prod-nome').value;
                const qtd = item.querySelector('.prod-qtd').value;
                const valor = parseFloat(item.querySelector('.prod-valor').value) || 0;
                if(nome && qtd) {
                    itens.push({ nome, quantidade: parseInt(qtd), valor });
                }
            });

            // Coleta Logística
            const logisticaSelect = document.getElementById('logistica');
            const logisticaOpcao = logisticaSelect.options[logisticaSelect.selectedIndex];

            const novaCompra = {
                id: Date.now().toString(),
                data: document.getElementById('dataCompra').value,
                fornecedor: document.getElementById('fornecedor').value,
                produtos: itens,
                logistica: {
                    nome: logisticaOpcao.getAttribute('data-nome'),
                    valor: parseFloat(logisticaOpcao.value) || 0
                },
                valorTotal: calcularTotalForm()
            };

            compras.push(novaCompra);
            salvarDados();
            
            // Limpa o formulário (mantém apenas 1 linha de produto e data)
            document.getElementById('fornecedor').value = '';
            document.getElementById('logistica').value = "0";
            
            const produtosList = document.getElementById('produtosList');
            const linhasProdutos = produtosList.querySelectorAll('.produto-item');
            for(let i = 1; i < linhasProdutos.length; i++) {
                linhasProdutos[i].remove();
            }
            linhasProdutos[0].querySelector('.prod-nome').value = '';
            linhasProdutos[0].querySelector('.prod-qtd').value = '';
            linhasProdutos[0].querySelector('.prod-valor').value = '';
            
            calcularTotalForm();
            renderCalendar();

            // Feedback Visual
            const btn = e.target.querySelector('button[type="submit"]');
            const originalHtml = btn.innerHTML;
            btn.innerHTML = '<i class="ph ph-check-circle text-xl"></i> Salvo com sucesso!';
            btn.classList.replace('bg-indigo-600', 'bg-emerald-500');
            btn.classList.replace('hover:bg-indigo-700', 'hover:bg-emerald-600');
            setTimeout(() => {
                btn.innerHTML = originalHtml;
                btn.classList.replace('bg-emerald-500', 'bg-indigo-600');
                btn.classList.replace('hover:bg-emerald-600', 'hover:bg-indigo-700');
            }, 2000);
        }

        // --- Lógica do Calendário ---
        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            mesAnoAtualEl.textContent = `${meses[month]} ${year}`;
            calendarGridEl.innerHTML = '';

            const firstDayOfMonth = new Date(year, month, 1).getDay();
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            const daysInPrevMonth = new Date(year, month, 0).getDate();

            for (let i = firstDayOfMonth - 1; i >= 0; i--) {
                calendarGridEl.appendChild(createDayCell(year, month - 1, daysInPrevMonth - i, true));
            }

            let totalPedidosDesteMes = 0;
            let valorTotalDesteMes = 0;

            for (let day = 1; day <= daysInMonth; day++) {
                const cellInfo = createDayCell(year, month, day, false);
                calendarGridEl.appendChild(cellInfo.element);
                totalPedidosDesteMes += cellInfo.comprasCount;
                valorTotalDesteMes += cellInfo.valorDia;
            }

            totalPedidosMesEl.textContent = totalPedidosDesteMes;
            totalValorMesEl.textContent = formatadorMoeda.format(valorTotalDesteMes);

            const totalCells = firstDayOfMonth + daysInMonth;
            const remainingCells = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
            
            for (let day = 1; day <= remainingCells; day++) {
                calendarGridEl.appendChild(createDayCell(year, month + 1, day, true));
            }
        }

        function createDayCell(year, month, day, isOtherMonth) {
            const cellDate = new Date(year, month, day);
            const actualYear = cellDate.getFullYear();
            const actualMonth = cellDate.getMonth();
            const dateString = `${actualYear}-${String(actualMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
            
            const hoje = new Date();
            const isToday = !isOtherMonth && day === hoje.getDate() && actualMonth === hoje.getMonth() && actualYear === hoje.getFullYear();

            const comprasDoDia = compras.filter(c => c.data === dateString);
            let valorTotalDoDia = 0;
            comprasDoDia.forEach(c => valorTotalDoDia += (c.valorTotal || 0));

            const cell = document.createElement('div');
            cell.className = `calendar-cell bg-white p-2 flex flex-col gap-1 transition-all relative group
                             ${isOtherMonth ? 'text-slate-400 bg-slate-50/50' : 'text-slate-700 hover:shadow-md hover:z-10 cursor-pointer border border-transparent hover:border-indigo-200'} `;
            
            const dayNumberClasses = isToday 
                ? 'bg-indigo-600 text-white w-7 h-7 rounded-full flex items-center justify-center font-bold text-sm shadow-md'
                : 'font-bold text-slate-500 text-sm w-7 h-7 flex items-center justify-center';

            cell.innerHTML = `<div class="flex justify-between items-start mb-1">
                                <div class="${dayNumberClasses}">${day}</div>
                                ${valorTotalDoDia > 0 && !isOtherMonth ? `<span class="text-[10px] font-bold text-emerald-600 bg-emerald-50 px-1.5 py-0.5 rounded">${formatadorMoeda.format(valorTotalDoDia)}</span>` : ''}
                              </div>`;

            const maxVisible = 2;
            const comprasContainer = document.createElement('div');
            comprasContainer.className = 'flex flex-col gap-1.5 overflow-hidden';

            comprasDoDia.slice(0, maxVisible).forEach(compra => {
                const tag = document.createElement('div');
                const colors = ['bg-indigo-50 border-indigo-100 text-indigo-700', 'bg-emerald-50 border-emerald-100 text-emerald-700', 'bg-amber-50 border-amber-100 text-amber-700'];
                const colorIdx = compra.fornecedor.length % colors.length;
                
                // Pega a qtd do primeiro item para dar ideia na miniatura
                const desc = compra.produtos ? `${compra.produtos[0].quantidade}x ${compra.produtos[0].nome}` : compra.produto;
                
                tag.className = `text-[11px] p-1.5 rounded border shadow-sm leading-tight ${colors[colorIdx]}`;
                tag.innerHTML = `<div class="font-bold truncate">${compra.fornecedor}</div><div class="truncate opacity-80 text-[10px]">${desc}</div>`;
                comprasContainer.appendChild(tag);
            });

            if (comprasDoDia.length > maxVisible) {
                const moreTag = document.createElement('div');
                moreTag.className = 'text-xs text-slate-500 font-bold px-1 text-center bg-slate-100 rounded py-0.5';
                moreTag.textContent = `+${comprasDoDia.length - maxVisible} pedidos`;
                comprasContainer.appendChild(moreTag);
            }

            cell.appendChild(comprasContainer);

            if (!isOtherMonth) {
                cell.addEventListener('click', () => openDayModal(dateString, day, actualMonth, actualYear, comprasDoDia, valorTotalDoDia));
            }

            return isOtherMonth ? cell : { element: cell, comprasCount: comprasDoDia.length, valorDia: valorTotalDoDia };
        }

        // --- Lógica do Modal ---
        function deletarCompra(id, dateString, day, month, year) {
            if (confirm('Tem certeza que deseja excluir este recibo de compra?')) {
                compras = compras.filter(compra => compra.id !== id);
                salvarDados();
                renderCalendar();
                
                const comprasRestantes = compras.filter(c => c.data === dateString);
                let novoTotal = 0;
                comprasRestantes.forEach(c => novoTotal += (c.valorTotal || 0));
                
                if(comprasRestantes.length === 0) {
                    closeModalHandler();
                } else {
                    openDayModal(dateString, day, month, year, comprasRestantes, novoTotal);
                }
            }
        }

        function openDayModal(dateString, day, month, year, comprasDoDia, valorTotalDoDia) {
            modalTitle.textContent = `${day} de ${meses[month]}`;
            modalSubtitle.textContent = `Detalhamento de compras para esta data`;
            modalTotalDia.textContent = formatadorMoeda.format(valorTotalDoDia);
            
            if (comprasDoDia.length === 0) {
                modalContent.innerHTML = `
                    <div class="text-center py-10 flex flex-col items-center">
                        <div class="bg-slate-100 p-4 rounded-full mb-3 text-slate-400">
                            <i class="ph ph-calendar-x text-4xl"></i>
                        </div>
                        <p class="text-slate-500 font-medium">Nenhuma compra agendada.</p>
                    </div>`;
            } else {
                let html = '';
                comprasDoDia.forEach(compra => {
                    // Monta lista de produtos
                    let produtosHtml = '';
                    if (compra.produtos && compra.produtos.length > 0) {
                        compra.produtos.forEach(p => {
                            produtosHtml += `
                            <div class="flex justify-between items-center py-2 border-b border-slate-100 last:border-0 text-sm">
                                <div class="flex gap-2 items-center">
                                    <span class="bg-slate-100 text-slate-600 px-2 py-0.5 rounded text-xs font-bold">${p.quantidade}x</span>
                                    <span class="text-slate-700">${p.nome}</span>
                                </div>
                                <span class="font-bold text-slate-800">${formatadorMoeda.format(p.valor)}</span>
                            </div>`;
                        });
                    } else if(compra.produto) { // Legado
                        produtosHtml = `<div class="py-2 text-sm text-slate-600">${compra.produto}</div>`;
                    }

                    // Monta Logística
                    let logisticaHtml = '';
                    if (compra.logistica && compra.logistica.valor > 0) {
                        logisticaHtml = `
                            <div class="flex justify-between items-center py-2 px-3 mt-2 bg-amber-50 rounded text-sm border border-amber-100">
                                <span class="text-amber-800 flex items-center gap-1.5"><i class="ph ph-truck"></i> Logística: ${compra.logistica.nome}</span>
                                <span class="font-bold text-amber-900">+ ${formatadorMoeda.format(compra.logistica.valor)}</span>
                            </div>`;
                    }

                    // Total do Recibo
                    const valorTotalExibicao = formatadorMoeda.format(compra.valorTotal || 0);

                    html += `
                        <div class="bg-white p-5 rounded-xl border border-slate-200 shadow-sm relative mb-4">
                            <button onclick="deletarCompra('${compra.id}', '${dateString}', ${day}, ${month}, ${year})" class="absolute top-4 right-4 text-slate-400 hover:text-red-500 hover:bg-red-50 p-1.5 rounded transition-colors" title="Excluir Compra">
                                <i class="ph ph-trash text-lg"></i>
                            </button>
                            
                            <div class="flex items-center gap-2 mb-3 pr-10">
                                <div class="bg-indigo-100 text-indigo-600 p-2 rounded-lg"><i class="ph ph-storefront text-xl"></i></div>
                                <h4 class="font-black text-slate-800 text-lg uppercase tracking-wide">${compra.fornecedor}</h4>
                            </div>

                            <div class="bg-slate-50 border border-slate-100 rounded-lg p-3 mb-3">
                                <h5 class="text-xs font-bold text-slate-400 uppercase tracking-wider mb-1">Itens</h5>
                                ${produtosHtml}
                            </div>
                            
                            ${logisticaHtml}

                            <div class="mt-4 pt-3 border-t border-slate-200 flex justify-between items-center">
                                <span class="text-slate-500 font-bold uppercase text-xs tracking-wider">Total Fornecedor</span>
                                <span class="text-xl font-black text-indigo-700">${valorTotalExibicao}</span>
                            </div>
                        </div>
                    `;
                });
                modalContent.innerHTML = html;
            }

            modal.classList.remove('hidden');
            modal.classList.add('flex');
        }

        function closeModalHandler() {
            modal.classList.add('hidden');
            modal.classList.remove('flex');
        }

        // --- Event Listeners ---
        function setupEventListeners() {
            document.getElementById('btnPrevMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() - 1); renderCalendar(); });
            document.getElementById('btnNextMonth').addEventListener('click', () => { currentDate.setMonth(currentDate.getMonth() + 1); renderCalendar(); });
            document.getElementById('btnHoje').addEventListener('click', () => { currentDate = new Date(); renderCalendar(); });

            // Adicionar novo campo de produto
            document.getElementById('btnAddProduto').addEventListener('click', () => {
                const container = document.getElementById('produtosList');
                const newItem = document.createElement('div');
                newItem.className = 'produto-item flex flex-wrap sm:flex-nowrap gap-2 items-center mt-2 pt-2 border-t border-slate-200';
                newItem.innerHTML = `
                    <input type="text" class="prod-nome flex-1 min-w-[120px] px-3 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="Nome do Item" required>
                    <input type="number" class="prod-qtd w-20 px-3 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="Qtd" min="1" required>
                    <div class="relative w-28">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-2 text-slate-500 text-xs font-bold">R$</span>
                        <input type="number" class="prod-valor w-full pl-7 pr-2 py-1.5 border border-slate-300 rounded focus:ring-2 focus:ring-indigo-500 text-sm" placeholder="0.00" step="0.01" min="0" required oninput="calcularTotalForm()">
                    </div>
                    <button type="button" class="text-red-500 hover:text-red-700 p-1.5 hover:bg-red-50 rounded transition-colors" onclick="this.parentElement.remove(); calcularTotalForm();" title="Remover item">
                        <i class="ph ph-trash font-bold text-lg"></i>
                    </button>
                `;
                container.appendChild(newItem);
            });

            formCompra.addEventListener('submit', handleAddPurchase);
            closeModalBtns.forEach(btn => btn.addEventListener('click', closeModalHandler));
            modal.addEventListener('click', (e) => { if (e.target === modal) closeModalHandler(); });
        }

        window.addEventListener('DOMContentLoaded', init);
    </script>
</body>
</html>
